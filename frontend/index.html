<!DOCTYPE html>
<html>

<head>
<title>Bot Battle CAPTCHA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div>

</div>

🤖

<h2 id="result"></h2>


</div>


<script src="script.js"></script>

</body>

</html>
